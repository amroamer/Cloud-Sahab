  # .github/workflows/azure-deploy.yml
  # ─────────────────────────────────────────────────────────────
  # Triggers: every push to the main branch
  # What it does: installs deps → builds app → deploys to Azure
  # ─────────────────────────────────────────────────────────────
  name: Deploy Sahab to Azure
  
  on:
    push:
      branches:
        - main          # Only runs when you push to main
  
  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest
      name: Build and Deploy
  
      steps:
  
        # Step 1: Check out your code
        - name: Checkout repository
          uses: actions/checkout@v4
  
        # Step 2: Set up Node.js 20
        - name: Set up Node.js 20
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
  
        # Step 3: Install all dependencies
        - name: Install dependencies
          run: npm ci
  
        # Step 4: Build the production bundle
        #   - Runs: tsx script/build.ts
        #   - Output: dist/index.cjs + dist/public/
        - name: Build production app
          run: npm run build
  
        # Step 5: Run database migrations against Azure PostgreSQL
        #   Only runs on first deploy or when schema changes.
        #   DATABASE_URL must be set in GitHub repo secrets
        #   if you want migrations to run in CI.
        #   (Optional — you can also run this manually once)
        # - name: Run database migrations
        #   run: npm run db:push
        #   env:
        #     DATABASE_URL: ${{ secrets.DATABASE_URL }}
  
        # Step 6: Deploy to Azure App Service
        - name: Deploy to Azure Web App
          uses: azure/webapps-deploy@v3
          with:
            app-name: 'sahab'    # ← must match your App Service name
            publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
            package: '.'
  
        # Step 7: Print the live URL
        - name: Show deployment URL
          run: |
            echo "✅ Deployed to: https://cloud-sahab.azurewebsites.net"
